# Example language-modeling config for mechbench.
#
# Trains a ~10M-param attention-only MechModel on a small subset of C4 and
# evaluates against held-out perplexity (wikitext_103, c4_en) plus two
# downstream ICL tasks (piqa, hellaswag).
#
# Run with:
#   uv run python scripts/train_lm.py configs/lm/mechbench-10m.yaml
#
# Any ``key=value`` overrides supplied after the YAML path are merged on top
# via OmegaConf dotlists (e.g. ``optimizer.learning_rate=1e-4``).

run_name: mechbench-10m-attn
seed: 6198

model:
  vocab_size: 50304
  d_model: 320
  n_heads: 8
  max_seq_len: 1024
  block_types: [attn, attn, attn, attn, attn, attn, attn, attn]
  mlp_hidden_mult: 2.0
  rope: true
  use_flash: true
  tie_embeddings: true
  pad_token_id: 1
  eos_token_id: 0

optimizer:
  name: adamw
  learning_rate: 3.0e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1.0e-8

scheduler:
  name: cosine_with_warmup
  t_warmup: 100
  alpha_f: 0.1

tokenizer:
  identifier: tokenizers/allenai_gpt-neox-olmo-dolma-v1_5.json
  truncate_direction: right

# 5-file subset of C4 preprocessed with the GPT-NeoX tokenizer.
data:
  pad_direction: right
  num_workers: 2
  drop_last: true
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  memmap_dtype: uint16
  paths:
    - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/preprocessed/c4/v1_7-dd_ngram_dp_030-qc_cc_en_bin_001-fix/gpt-neox-olmo-dolma-v1_5/part-000-00000.npy
    - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/preprocessed/c4/v1_7-dd_ngram_dp_030-qc_cc_en_bin_001-fix/gpt-neox-olmo-dolma-v1_5/part-001-00000.npy
    - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/preprocessed/c4/v1_7-dd_ngram_dp_030-qc_cc_en_bin_001-fix/gpt-neox-olmo-dolma-v1_5/part-002-00000.npy
    - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/preprocessed/c4/v1_7-dd_ngram_dp_030-qc_cc_en_bin_001-fix/gpt-neox-olmo-dolma-v1_5/part-003-00000.npy
    - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/preprocessed/c4/v1_7-dd_ngram_dp_030-qc_cc_en_bin_001-fix/gpt-neox-olmo-dolma-v1_5/part-004-00000.npy

save_folder: /scratch/gpfs/EHAZAN/tharuntk/mechbench-lm/runs/${run_name}
save_interval: 500
save_num_checkpoints_to_keep: 2
save_overwrite: true

max_duration: 1000
global_train_batch_size: 64
device_train_microbatch_size: 16
device_eval_batch_size: 16

eval_interval: 500
eval_subset_num_batches: 5

precision: amp_bf16
max_grad_norm: 1.0

log_interval: 10

evaluators:
  - label: c4_en
    type: lm
    data:
      paths:
        - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/eval-data/perplexity/v3_small_gptneox20b/c4_en/val/part-0-00000.npy
      memmap_dtype: uint16
      pad_direction: right
      drop_last: false

  - label: wikitext_103
    type: lm
    data:
      paths:
        - /scratch/gpfs/EHAZAN/tharuntk/OLMo-data/eval-data/perplexity/v3_small_gptneox20b/wikitext_103/val/part-0-00000.npy
      memmap_dtype: uint16
      pad_direction: right
      drop_last: false

  - label: piqa
    type: downstream

  - label: hellaswag
    type: downstream
