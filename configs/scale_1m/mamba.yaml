# Mamba at ~1M params (scale_1m).
# Param count: 1,004,528  (+0.45% of 1,000,000)
# Param-matched against configs/scale_1m/transformer.yaml and stu.yaml.
# Data settings (task/seq_len/vocab/batch/steps) are identical across the three.

arch: mamba
scale: 1m

# --- data ---
task: induction
seq_len: 256
vocab_size: 64
batch_size: 128
eval_batch_size: 256

# --- training ---
max_steps: 4000
warmup_steps: 200
eval_every: 500
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

# --- model (overrides arch_preset) ---
model:
  d_model: 112
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [mamba, mamba, mamba, mamba, mamba, mamba]
  d_state: 16
  d_conv: 4
  mamba_expand: 2
  tie_embeddings: true
  dropout: 0.0
