# flash-stu-2 STU at ~1M params (scale_1m).
# Param count: 1,003,960  (+0.40% of 1,000,000)
# Param-matched against configs/scale_1m/transformer.yaml and mamba.yaml.
# Data settings (task/seq_len/vocab/batch/steps) are identical across the three.

arch: stu
scale: 1m

# --- data ---
task: induction
seq_len: 256
vocab_size: 64
batch_size: 128
eval_batch_size: 256

# --- training ---
max_steps: 4000
warmup_steps: 200
eval_every: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

# --- model (overrides arch_preset) ---
model:
  d_model: 152
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [stu, stu, stu, stu, stu, stu]
  num_eigh: 24
  use_hankel_L: false
  tie_embeddings: true
  dropout: 0.0
