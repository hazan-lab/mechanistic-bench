# Vanilla causal transformer at ~1M params.
# Param count: 992,896  (-0.71% of 1,000,000)
# Param-matched against configs/scale_1m/models/{mamba,stu,lstm,mamba2,headwise,alt_attn_mamba}.yaml.

arch: attn
scale: 1m

# Training defaults (tasks.yaml may override per task).
batch_size: 128
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

# Model hyperparams. max_seq_len and vocab_size are set from the task entry.
model:
  d_model: 128
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [attn, attn, attn, attn, attn, attn]
  rope: true
  use_flash: true
  tie_embeddings: true
  dropout: 0.0
