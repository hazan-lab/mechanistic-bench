# flash-stu-2 STU at ~1M params.
# Param count: 1,003,960  (+0.40% of 1,000,000)

arch: stu
scale: 1m

batch_size: 128
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

model:
  d_model: 152
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [stu, stu, stu, stu, stu, stu]
  num_eigh: 24
  use_hankel_L: false
  tie_embeddings: true
  dropout: 0.0
