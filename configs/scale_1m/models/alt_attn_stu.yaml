# Layer-wise attention/STU hybrid at ~1M params.
# Alternating attn/stu blocks: [attn, stu, attn, stu, attn, stu].
# Param count: 1,078,992  (+7.90% of 1,000,000)
#
# d=144 is the closest-to-budget choice keeping RoPE-friendly head_dim=36.
# d=128 undershoots (-14.5%), d=152 overshoots (+20%).

arch: alt_attn_stu
scale: 1m

batch_size: 128
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

model:
  d_model: 144
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [attn, stu, attn, stu, attn, stu]
  rope: true
  use_flash: true
  num_eigh: 24
  use_hankel_L: false
  tie_embeddings: true
  dropout: 0.0
