# Layer-wise attention/mamba hybrid at ~1M params.
# Alternating attn/mamba blocks: [attn, mamba, attn, mamba, attn, mamba].
# Param count: 1,010,760  (+1.08% of 1,000,000)

arch: alt_attn_mamba
scale: 1m

batch_size: 128
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

model:
  d_model: 120
  n_heads: 4
  mlp_hidden_mult: 2.0
  block_types: [attn, mamba, attn, mamba, attn, mamba]
  rope: true
  use_flash: true
  d_state: 16
  d_conv: 4
  mamba_expand: 2
  tie_embeddings: true
  dropout: 0.0
