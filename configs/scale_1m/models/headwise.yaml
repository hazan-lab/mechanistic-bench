# Head-wise attention/mamba hybrid at ~1M params.
# Each block splits heads between attention and mamba branches
# (n_attn_heads of n_heads go to attention, rest to mamba).
# Param count: 961,800  (-3.82% of 1,000,000)
# Looser match than other archs: head_dim must be even for RoPE, constraining
# d_model to multiples of 8. d=120 is the closest feasible; d=128 overshoots
# to +9%.

arch: headwise
scale: 1m

batch_size: 128
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

model:
  d_model: 120
  n_heads: 4
  n_attn_heads: 2
  mlp_hidden_mult: 2.0
  block_types: [headwise, headwise, headwise, headwise, headwise, headwise]
  rope: true
  use_flash: true
  d_state: 16
  d_conv: 4
  mamba_expand: 2
  tie_embeddings: true
  dropout: 0.0
