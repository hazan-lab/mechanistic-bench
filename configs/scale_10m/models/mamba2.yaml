# Mamba-2 (SSD) at ~10M params.
# Matches arch_preset("mamba2", "10m"): d_model=256, 8 layers.
# d_state=256 (not 16) — Mamba-2 SSD makes large d_state cheap.

arch: mamba2
scale: 10m

batch_size: 64
eval_batch_size: 256
eval_every: 200
max_steps: 4000
warmup_steps: 200
lr: 3.0e-4
weight_decay: 0.1
grad_clip: 1.0
dtype: bf16
seed: 42
log_every: 50

model:
  d_model: 256
  n_heads: 8
  mlp_hidden_mult: 2.0
  block_types: [mamba2, mamba2, mamba2, mamba2, mamba2, mamba2, mamba2, mamba2]
  d_state: 256
  d_conv: 4
  mamba_expand: 2
  mamba2_headdim: 64
  mamba2_chunk_size: 256
  tie_embeddings: true
  dropout: 0.0
